source: granola
auth: api_key
auth_env: NANOBRAIN_GRANOLA_KEY
auth_file: brain/.env
api_base: https://public-api.granola.ai
windows:
  work: 30
  personal: 30
fetch:
  via: NANOBRAIN_GRANOLA_STUB | api_key
schedule:
  cron_minutes: 60
notes: >
  Requires grn_ API key from Granola desktop app: Settings → API → Create new key.
  Key is stored in <brain_dir>/.env (chmod 600, gitignored).
  API only returns notes with a generated AI summary.
